name: Release & Publish

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  ARCHIVE_PREFIX: dotbot-v3

jobs:
  # ── Gate: run tests before releasing ────────────────────────
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install PowerShell (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          if ! command -v pwsh &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y powershell
          fi

      - name: Install PowerShell (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if ! command -v pwsh &> /dev/null; then
            brew install powershell/tap/powershell
          fi

      - name: Install powershell-yaml
        shell: pwsh
        run: Install-Module -Name powershell-yaml -Scope CurrentUser -Force -AllowClobber

      - name: Run tests (layers 1-3)
        shell: pwsh
        run: ./tests/Run-Tests.ps1

  # ── Build release archives ─────────────────────────────────
  release:
    name: Create GitHub Release
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      sha256_tar: ${{ steps.hashes.outputs.sha256_tar }}
      sha256_zip: ${{ steps.hashes.outputs.sha256_zip }}
    steps:
      - uses: actions/checkout@v4

      - name: Install PowerShell
        run: |
          if ! command -v pwsh &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y powershell
          fi

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate version matches version.json
        shell: pwsh
        run: |
          $expected = "${{ steps.version.outputs.version }}"
          $actual = (Get-Content version.json | ConvertFrom-Json).version
          if ($expected -ne $actual) {
            Write-Error "Tag version ($expected) does not match version.json ($actual)"
            exit 1
          }

      - name: Build archives
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          STAGING="${ARCHIVE_PREFIX}-${VERSION}"
          mkdir "$STAGING"
          cp -r install.ps1 install-remote.ps1 scripts/ profiles/ LICENSE README.md \
                version.json dotbot.psd1 dotbot.psm1 "$STAGING/"
          tar czf "${STAGING}.tar.gz" "$STAGING"
          zip -r "${STAGING}.zip" "$STAGING"

      - name: Compute SHA256
        id: hashes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "sha256_tar=$(sha256sum ${ARCHIVE_PREFIX}-${VERSION}.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "sha256_zip=$(sha256sum ${ARCHIVE_PREFIX}-${VERSION}.zip | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          sha256sum ${ARCHIVE_PREFIX}-${VERSION}.tar.gz > ${ARCHIVE_PREFIX}-${VERSION}.tar.gz.sha256
          sha256sum ${ARCHIVE_PREFIX}-${VERSION}.zip > ${ARCHIVE_PREFIX}-${VERSION}.zip.sha256

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes \
            "${ARCHIVE_PREFIX}-${VERSION}.tar.gz" \
            "${ARCHIVE_PREFIX}-${VERSION}.zip" \
            "${ARCHIVE_PREFIX}-${VERSION}.tar.gz.sha256" \
            "${ARCHIVE_PREFIX}-${VERSION}.zip.sha256"

  # ── Publish to PowerShell Gallery ──────────────────────────
  publish-psgallery:
    name: Publish to PSGallery
    needs: release
    runs-on: ubuntu-latest
    if: vars.ENABLE_PSGALLERY == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install PowerShell
        run: |
          if ! command -v pwsh &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y powershell
          fi

      - name: Prepare module
        shell: pwsh
        run: |
          $version = "${{ needs.release.outputs.version }}"
          $staging = "publish-staging/dotbot"
          New-Item -ItemType Directory -Path $staging -Force
          Copy-Item dotbot.psd1, dotbot.psm1, install.ps1, install-remote.ps1, LICENSE, README.md -Destination $staging
          Copy-Item -Recurse scripts, profiles -Destination $staging
          Update-ModuleManifest -Path "$staging/dotbot.psd1" -ModuleVersion $version

      - name: Publish
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          Publish-Module -Path "publish-staging/dotbot" -NuGetApiKey $env:PSGALLERY_API_KEY -Verbose

  # ── Update Scoop manifest ──────────────────────────────────
  update-scoop:
    name: Update Scoop Manifest
    needs: release
    runs-on: ubuntu-latest
    if: vars.ENABLE_SCOOP == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          repository: andresharpe/scoop-dotbot
          token: ${{ secrets.SCOOP_REPO_TOKEN }}

      - name: Install PowerShell
        run: |
          if ! command -v pwsh &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y powershell
          fi

      - name: Update manifest
        shell: pwsh
        run: |
          $version = "${{ needs.release.outputs.version }}"
          $hash = "${{ needs.release.outputs.sha256_zip }}"
          $manifest = Get-Content bucket/dotbot.json | ConvertFrom-Json
          $manifest.version = $version
          $manifest.url = "https://github.com/andresharpe/dotbot-v3/releases/download/v${version}/dotbot-v3-${version}.zip"
          $manifest.hash = $hash
          $manifest | ConvertTo-Json -Depth 10 | Set-Content bucket/dotbot.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/dotbot.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update dotbot to v${{ needs.release.outputs.version }}"
          git push

  # ── Update Homebrew formula ────────────────────────────────
  update-homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    if: vars.ENABLE_HOMEBREW == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          repository: andresharpe/homebrew-dotbot
          token: ${{ secrets.HOMEBREW_REPO_TOKEN }}

      - name: Update formula
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          SHA="${{ needs.release.outputs.sha256_tar }}"
          sed -i "s|url \".*\"|url \"https://github.com/andresharpe/dotbot-v3/releases/download/v${VERSION}/dotbot-v3-${VERSION}.tar.gz\"|" Formula/dotbot.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA}\"|" Formula/dotbot.rb
          # Update version in desc if present
          sed -i "s|version \".*\"|version \"${VERSION}\"|" Formula/dotbot.rb 2>/dev/null || true

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/dotbot.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update dotbot to v${{ needs.release.outputs.version }}"
          git push
