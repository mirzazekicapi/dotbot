name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_e2e:
        description: 'Run Layer 4 (real Claude) tests'
        type: boolean
        default: false
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC

jobs:
  test:
    name: Layers 1-3 (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PowerShell (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if command -v pwsh &> /dev/null; then
            echo "PowerShell already installed: $(pwsh --version)"
          else
            if [ "$RUNNER_OS" = "Linux" ]; then
              sudo apt-get update
              sudo apt-get install -y powershell
            elif [ "$RUNNER_OS" = "macOS" ]; then
              brew install powershell/tap/powershell
            fi
          fi

      - name: Install powershell-yaml module
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          # Ensure PSGallery exists and is trusted
          if (-not (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue)) {
            Register-PSRepository -Default
          }
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted

          # Ensure NuGet provider for PowerShellGet v2 (best-effort — already present on most PS7 runners)
          Install-PackageProvider -Name NuGet -MinimumVersion 2.8.5.201 -Force -ErrorAction SilentlyContinue | Out-Null

          # Try classic install first, then PSResourceGet fallback
          try {
            Install-Module -Name powershell-yaml -Repository PSGallery -Scope CurrentUser -Force -AllowClobber
          } catch {
            Write-Host "Install-Module failed, trying Install-PSResource..."
            if (-not (Get-Module -ListAvailable -Name Microsoft.PowerShell.PSResourceGet)) {
              Install-Module Microsoft.PowerShell.PSResourceGet -Scope CurrentUser -Force -AllowClobber
            }
            Import-Module Microsoft.PowerShell.PSResourceGet
            Install-PSResource -Name powershell-yaml -Repository PSGallery -TrustRepository -Scope CurrentUser -Reinstall
          }

      - name: Setup Node.js (for npx)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dotbot globally
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File install.ps1

      - name: Validate markdown references
        shell: pwsh
        run: |
          $result = & ./core/hooks/verify/03-check-md-refs.ps1 -RepoRoot . | ConvertFrom-Json
          if (-not $result.success) {
            Write-Host "::error::$($result.message)"
            foreach ($f in $result.failures) {
              Write-Host "::error file=$($f.file),line=$($f.line)::Broken reference: $($f.reference)"
            }
            exit 1
          }
          Write-Host "All references valid ($($result.details.references_found) checked, $($result.details.references_skipped) skipped)"

      - name: Run Layers 1-3
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File tests/Run-Tests.ps1 -Layer all

  test-e2e:
    name: Layer 4 - E2E Claude
    if: github.event.inputs.run_e2e == 'true' || github.event_name == 'schedule'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PowerShell
        shell: bash
        run: |
          if ! command -v pwsh &> /dev/null; then
            sudo apt-get update
            sudo apt-get install -y powershell
          fi

      - name: Install powershell-yaml module
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          # Ensure PSGallery exists and is trusted
          if (-not (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue)) {
            Register-PSRepository -Default
          }
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted

          # Ensure NuGet provider for PowerShellGet v2 (best-effort — already present on most PS7 runners)
          Install-PackageProvider -Name NuGet -MinimumVersion 2.8.5.201 -Force -ErrorAction SilentlyContinue | Out-Null

          # Try classic install first, then PSResourceGet fallback
          try {
            Install-Module -Name powershell-yaml -Repository PSGallery -Scope CurrentUser -Force -AllowClobber
          } catch {
            Write-Host "Install-Module failed, trying Install-PSResource..."
            if (-not (Get-Module -ListAvailable -Name Microsoft.PowerShell.PSResourceGet)) {
              Install-Module Microsoft.PowerShell.PSResourceGet -Scope CurrentUser -Force -AllowClobber
            }
            Import-Module Microsoft.PowerShell.PSResourceGet
            Install-PSResource -Name powershell-yaml -Repository PSGallery -TrustRepository -Scope CurrentUser -Reinstall
          }

      - name: Install dotbot globally
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File install.ps1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Layer 4 (E2E)
        shell: pwsh
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DOTBOT_SERVER_URL: ${{ secrets.DOTBOT_SERVER_URL }}
          DOTBOT_API_KEY: ${{ secrets.DOTBOT_API_KEY }}
          DOTBOT_TEAMS_RECIPIENT: ${{ secrets.DOTBOT_TEAMS_RECIPIENT }}
          DOTBOT_EMAIL_RECIPIENT: ${{ secrets.DOTBOT_EMAIL_RECIPIENT }}
          DOTBOT_JIRA_ISSUE_KEY: ${{ secrets.DOTBOT_JIRA_ISSUE_KEY }}
          DOTBOT_JIRA_EMAIL_RECIPIENT: ${{ secrets.DOTBOT_JIRA_EMAIL_RECIPIENT }}
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File tests/Run-Tests.ps1 -Layer 4

  test-ui:
    name: Layer 5 - UI E2E (Playwright)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PowerShell
        shell: bash
        run: |
          if ! command -v pwsh &> /dev/null; then
            sudo apt-get update
            sudo apt-get install -y powershell
          fi

      - name: Install powershell-yaml module
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          # Ensure PSGallery exists and is trusted
          if (-not (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue)) {
            Register-PSRepository -Default
          }
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted

          # Ensure NuGet provider for PowerShellGet v2 (best-effort — already present on most PS7 runners)
          Install-PackageProvider -Name NuGet -MinimumVersion 2.8.5.201 -Force -ErrorAction SilentlyContinue | Out-Null

          # Try classic install first, then PSResourceGet fallback
          try {
            Install-Module -Name powershell-yaml -Repository PSGallery -Scope CurrentUser -Force -AllowClobber
          } catch {
            Write-Host "Install-Module failed, trying Install-PSResource..."
            if (-not (Get-Module -ListAvailable -Name Microsoft.PowerShell.PSResourceGet)) {
              Install-Module Microsoft.PowerShell.PSResourceGet -Scope CurrentUser -Force -AllowClobber
            }
            Import-Module Microsoft.PowerShell.PSResourceGet
            Install-PSResource -Name powershell-yaml -Repository PSGallery -TrustRepository -Scope CurrentUser -Reinstall
          }

      - name: Install dotbot globally
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File install.ps1

      - name: Setup Node.js (with npm cache)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests/e2e/package-lock.json

      - name: Install Playwright npm dependencies
        working-directory: tests/e2e
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('tests/e2e/package-lock.json') }}

      - name: Install Playwright Chromium + system deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: tests/e2e
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps only (cached browser)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: tests/e2e
        run: npx playwright install-deps chromium

      - name: Run Layer 5 (UI E2E)
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File tests/Run-Tests.ps1 -Layer 5

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            tests/e2e/playwright-report/
            tests/e2e/test-results/
          retention-days: 7
          if-no-files-found: ignore
