name: Studio UI Build & Validate

on:
  push:
    branches: [main]
    paths:
      - 'src/studio-ui/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/studio-ui/**'
  workflow_dispatch:

jobs:
  build:
    name: Build & Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: src/studio-ui
        run: npm ci

      - name: TypeScript typecheck
        working-directory: src/studio-ui
        run: npx tsc --noEmit

      - name: Build
        working-directory: src/studio-ui
        run: npm run build
