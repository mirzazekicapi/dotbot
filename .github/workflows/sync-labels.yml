name: Sync labels

on:
  push:
    branches: [main]
    paths: [.github/labels.json]
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EndBug/label-sync@v2
        with:
          config-file: .github/labels.json
          delete-other-labels: false
          token: ${{ secrets.GITHUB_TOKEN }}
