name: decision_create
description: Create a new Decision Record in the workspace
inputSchema:
  type: object
  additionalProperties: true
  properties:
    title:
      type: string
      description: Short title for the decision (e.g. "Use PostgreSQL for primary data store")
    type:
      type: string
      description: Type of decision
      enum: [architecture, business, technical, process]
    context:
      type: string
      description: Background — why this decision needed to be made
    decision:
      type: string
      description: What was decided
    consequences:
      type: string
      description: Trade-offs, risks, follow-on constraints
    alternatives_considered:
      type: array
      description: Options evaluated and why they were rejected
      items:
        type: object
        properties:
          option:
            type: string
          reason_rejected:
            type: string
    stakeholders:
      type: array
      description: People involved in or affected by this decision
      items:
        type: string
    related_task_ids:
      type: array
      description: IDs of related tasks
      items:
        type: string
    related_decision_ids:
      type: array
      description: IDs of related decisions (e.g. ["dec-a1b2c3d4"])
      items:
        type: string
    tags:
      type: array
      description: Categorization tags (e.g. ["database", "infrastructure"])
      items:
        type: string
    impact:
      type: string
      description: Impact level of this decision
      enum: [high, medium, low]
    status:
      type: string
      description: Initial status — proposed (default) or accepted
      enum: [proposed, accepted]
  required: [title, context, decision]
