name: task_answer_question
description: Human answers a pending question on a task. Moves task back to analysing for continued analysis.
inputSchema:
  type: object
  properties:
    task_id:
      type: string
      description: "The unique identifier of the task"
    answer:
      type: string
      description: "The answer - either an option key (A, B, C, D, E) or a custom freeform answer"
    question_id:
      type: string
      description: "Optional: the ID of the specific question to answer when task has pending_questions batch (e.g. 'q1'). Defaults to the first pending question."
    attachments:
      type: array
      description: "Optional file attachments with metadata stored on disk: { name, size, path }"
      items:
        type: object
        properties:
          name:
            type: string
          size:
            type: integer
          path:
            type: string
  required:
    - task_id
    - answer
