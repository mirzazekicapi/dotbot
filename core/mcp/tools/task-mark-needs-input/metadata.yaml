name: task_mark_needs_input
description: Pause a task (in analysing or in-progress status) pending human input. Use 'questions' array to ask up to 4 questions at once. Use 'question' (singular) for a single question (legacy).
inputSchema:
  type: object
  properties:
    task_id:
      type: string
      description: "The unique identifier of the task"
    questions:
      type: array
      description: "Batch of 1-4 structured questions to ask in a single call. Preferred over 'question' (singular). Option A is always the recommended choice."
      minItems: 1
      maxItems: 4
      items:
        type: object
        properties:
          question:
            type: string
            description: "Clear, specific question text"
          context:
            type: string
            description: "Background info to help human decide"
          options:
            type: array
            description: "2-5 options, A is always the recommendation"
            minItems: 2
            maxItems: 5
            items:
              type: object
              properties:
                key:
                  type: string
                  enum: ["A", "B", "C", "D", "E"]
                  description: "Option key"
                label:
                  type: string
                  description: "Option text (A should include 'recommended' tag)"
                rationale:
                  type: string
                  description: "Brief explanation of pros/cons"
              required:
                - key
                - label
          recommendation:
            type: string
            description: "The recommended option key (should be 'A')"
            default: "A"
        required:
          - question
          - options
    question:
      type: object
      description: "Single structured question (legacy — prefer 'questions' array). Option A is always the recommended choice."
      properties:
        question:
          type: string
          description: "Clear, specific question text"
        context:
          type: string
          description: "Background info to help human decide"
        options:
          type: array
          description: "2-5 options, A is always the recommendation"
          minItems: 2
          maxItems: 5
          items:
            type: object
            properties:
              key:
                type: string
                enum: ["A", "B", "C", "D", "E"]
                description: "Option key"
              label:
                type: string
                description: "Option text (A should include 'recommended' tag)"
              rationale:
                type: string
                description: "Brief explanation of pros/cons"
            required:
              - key
              - label
        recommendation:
          type: string
          description: "The recommended option key (should be 'A')"
          default: "A"
      required:
        - question
        - options
    split_proposal:
      type: object
      description: "If present, this is a proposal to split the task (instead of a question)"
      properties:
        reason:
          type: string
          description: "Why the task should be split"
        sub_tasks:
          type: array
          description: "Proposed sub-tasks"
          items:
            type: object
            properties:
              name:
                type: string
              description:
                type: string
              effort:
                type: string
                enum: ["XS", "S", "M", "L", "XL"]
            required:
              - name
              - effort
      required:
        - reason
        - sub_tasks
    type:
      type: string
      enum: [singleChoice, approval, documentReview, freeText, priorityRanking]
      default: singleChoice
      description: "Question type (PRD Section 4.6). Drives card rendering and response parsing."
    deliverable_summary:
      type: string
      description: "1-3 line summary of what needs review (shown in channel notifications)"
    attachments:
      type: array
      description: "Files to upload to Mothership before publishing the template"
      items:
        type: object
        properties:
          path:
            type: string
            description: "Local file path to upload"
          description:
            type: string
        required:
          - path
    review_links:
      type: array
      description: "External URLs for reviewer context"
      items:
        type: object
        properties:
          title:
            type: string
          url:
            type: string
          type:
            type: string
            enum: [pull-request, document, design, other]
        required:
          - title
          - url
  required:
    - task_id
