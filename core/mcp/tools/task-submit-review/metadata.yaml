name: task_submit_review
description: Submit a human review decision for a task in needs-review status. Approve moves the task to done (after verification gates). Reject rolls back the worktree, appends reviewer feedback, and returns the task to todo so it can be reattempted.
inputSchema:
  type: object
  properties:
    task_id:
      type: string
      description: "The unique identifier of the task in needs-review status"
    approved:
      type: boolean
      description: "True to approve and complete the task, false to reject and restart it"
    comment:
      type: string
      description: "Reviewer comment — required when rejecting, optional when approving. Describe what the implementor must change."
    what_was_wrong:
      type: string
      description: "Specific description of what the implementation got wrong (used when rejecting to guide the next attempt)"
  required:
    - task_id
    - approved
