name: repo_clone
description: Clone a repository from Azure DevOps, create an initiative branch, and configure NuGet authentication. Returns the clone path, default branch, and working branch name.
version: 1.0.0
category: start-from-jira

inputSchema:
  type: object
  properties:
    project:
      type: string
      description: Azure DevOps project name (e.g., "Platform", "Services")
    repo:
      type: string
      description: Repository name (e.g., "OrderService")
  required: [project, repo]
  additionalProperties: false

examples:
  - description: Clone a repo from the Platform project
    input:
      project: Platform
      repo: OrderService
