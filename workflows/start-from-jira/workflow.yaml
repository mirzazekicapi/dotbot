name: start-from-jira
version: "3.5"
description: >-
  Research-driven initiative workflow with Atlassian and Azure DevOps
  integration. Fetches Jira context, runs multi-source research, synthesises
  findings, plans implementation, and creates handoff documents.
icon: search
min_dotbot_version: "3.5"

requires:
  env_vars:
    - var: AZURE_DEVOPS_PAT
      name: "Azure DevOps PAT"
      message: "Azure DevOps PAT is required for repo operations"
      hint: "Set AZURE_DEVOPS_PAT in .env.local (PAT needs Code Read/Write + Packaging Read scopes)"
    - var: AZURE_DEVOPS_ORG_URL
      name: "Azure DevOps Org URL"
      message: "Azure DevOps organisation URL is required"
      hint: "Set AZURE_DEVOPS_ORG_URL in .env.local (e.g. https://dev.azure.com/your-org)"
    - var: ATLASSIAN_EMAIL
      name: "Atlassian Email"
      message: "Atlassian email is required for downloading Jira/Confluence attachments"
      hint: "Set ATLASSIAN_EMAIL in .env.local"
    - var: ATLASSIAN_API_TOKEN
      name: "Atlassian API Token"
      message: "Atlassian API token is required for downloading Jira/Confluence attachments"
      hint: "Set ATLASSIAN_API_TOKEN in .env.local (create at https://id.atlassian.com/manage-profile/security/api-tokens)"
    - var: ATLASSIAN_CLOUD_ID
      name: "Atlassian Cloud ID"
      message: "Atlassian Cloud ID is required for downloading Jira/Confluence attachments"
      hint: "Set ATLASSIAN_CLOUD_ID in .env.local (UUID or site URL like https://yoursite.atlassian.net)"
  mcp_servers:
    - name: atlassian
      message: "Atlassian MCP server must be registered"
      hint: "Run: claude mcp add --transport http atlassian -s user https://mcp.atlassian.com/v1/mcp -- then run /mcp and authenticate"
    - name: sourcebot
      message: "Sourcebot MCP server is required for repository code search"
      hint: "Run 'claude mcp add sourcebot' to register the Sourcebot server"
    - name: dotbot
      message: "Dotbot MCP server is required for task management and repo operations"
      hint: "Run 'dotbot init --force' to re-register it"
  cli_tools:
    - name: git
      message: "git CLI is required for repository cloning and branch operations"
      hint: "Install from https://git-scm.com/ or run 'winget install Git.Git'"
    - name: az
      message: "Azure CLI is required for pull request creation"
      hint: "Install from https://aka.ms/installazurecliwindows or run 'winget install Microsoft.AzureCLI'"

form:
  description: "Claude will research your initiative via Atlassian (Jira + Confluence) and create your mission document and research roadmap."
  interview_label: "Research via Atlassian first"
  interview_hint: "Dotbot will fetch your Jira initiative and Confluence pages for context, then ask clarifying questions if needed"
  prompt_placeholder: "Paste a Jira initiative key (e.g. PROJ-123) or describe your initiative"

domain:
  task_categories: ["research", "analysis", "documentation", "implementation", "infrastructure"]
  atlassian:
    max_pages_to_read: 10
  azure_devops:
    branch_prefix: initiative

tasks:
  - name: "Fetch Jira Context"
    type: prompt
    workflow: "00-interview.md"
    outputs: ["briefing/jira-context.md"]
    commit:
      paths: ["workspace/product/"]
      message: "chore(workflow): phase 0 — jira context"
    priority: 1
    on_failure: halt

  - name: "Generate Product Documents"
    type: prompt
    workflow: "01-plan-product.md"
    depends_on: ["Fetch Jira Context"]
    outputs: ["mission.md", "roadmap-overview.md"]
    front_matter_docs: ["mission.md", "roadmap-overview.md", "research-repos.md"]
    commit:
      paths: ["workspace/product/"]
      message: "chore(workflow): phase 1 — product documents"
    priority: 2

  - name: "Plan Internet Research"
    type: task_gen
    workflow: "02a-plan-internet-research.md"
    depends_on: ["Generate Product Documents"]
    optional: true
    outputs_dir: "tasks/todo"
    min_output_count: 1
    commit:
      paths: ["workspace/tasks/"]
      message: "chore(workflow): phase 2a — internet research task created"
    priority: 3

  - name: "Plan Atlassian Research"
    type: task_gen
    workflow: "02b-plan-atlassian-research.md"
    depends_on: ["Generate Product Documents"]
    optional: true
    outputs_dir: "tasks/todo"
    min_output_count: 1
    commit:
      paths: ["workspace/tasks/"]
      message: "chore(workflow): phase 2b — atlassian research task created"
    priority: 4

  - name: "Plan Sourcebot Research"
    type: task_gen
    workflow: "02c-plan-sourcebot-research.md"
    depends_on: ["Generate Product Documents"]
    optional: true
    outputs_dir: "tasks/todo"
    min_output_count: 1
    commit:
      paths: ["workspace/tasks/"]
      message: "chore(workflow): phase 2c — sourcebot research task created"
    priority: 5

  - name: "Execute Research"
    type: barrier
    depends_on: ["Plan Internet Research", "Plan Atlassian Research", "Plan Sourcebot Research"]
    optional: true
    priority: 6

  - name: "Create Deep-Dive Tasks"
    type: task_gen
    workflow: "03-create-deep-dive-tasks.md"
    depends_on: ["Execute Research"]
    outputs_dir: "tasks/todo"
    min_output_count: 1
    condition: ".bot/workspace/product/research-repos.md"
    commit:
      paths: ["workspace/tasks/"]
      message: "chore(workflow): phase 4 — deep dive tasks created"
    priority: 7

  - name: "Execute Deep Dives"
    type: barrier
    depends_on: ["Create Deep-Dive Tasks"]
    optional: true
    condition: ".bot/workspace/product/research-repos.md"
    priority: 8

  - name: "Synthesise Research"
    type: prompt
    workflow: "04-post-research-review.md"
    depends_on: ["Execute Deep Dives"]
    outputs: ["research-summary.md"]
    commit:
      paths: ["workspace/product/"]
      message: "chore(workflow): post-research review"
    priority: 9

  - name: "Publish to Jira"
    type: prompt
    workflow: "12-publish-to-jira.md"
    depends_on: ["Synthesise Research"]
    commit:
      paths: ["workspace/product/"]
      message: "chore(workflow): publish research artifacts to Jira"
    priority: 10

  - name: "Research Repositories"
    type: prompt
    workflow: "05-implementation-research.md"
    depends_on: ["Publish to Jira"]
    condition: ".bot/workspace/product/research-repos.md"
    outputs: ["briefing/04_IMPLEMENTATION_RESEARCH.md"]
    commit:
      paths: ["workspace/product/"]
      message: "chore(workflow): phase 8 — implementation research"
    priority: 11

  - name: "Refine Dependencies"
    type: prompt
    workflow: "07-refine-artifacts.md"
    depends_on: ["Research Repositories"]
    condition: ".bot/workspace/product/briefing/04_IMPLEMENTATION_RESEARCH.md"
    outputs: ["briefing/05_DEPENDENCY_MAP.md"]
    commit:
      paths: ["workspace/product/"]
      message: "chore(workflow): phase 9 — refine artifacts"
    priority: 12

  - name: "Generate Implementation Plans"
    type: prompt
    workflow: "06-plan-implementation.md"
    depends_on: ["Refine Dependencies"]
    condition: ".bot/workspace/product/briefing/04_IMPLEMENTATION_RESEARCH.md"
    commit:
      paths: ["workspace/product/"]
      message: "chore(workflow): phase 10 — implementation plans"
    priority: 13

  - name: "Create Implementation Tasks"
    type: task_gen
    workflow: "09-create-impl-tasks.md"
    depends_on: ["Generate Implementation Plans"]
    condition: ".bot/workspace/product/briefing/04_IMPLEMENTATION_RESEARCH.md"
    outputs_dir: "tasks/todo"
    min_output_count: 1
    commit:
      paths: ["workspace/tasks/", "workspace/product/"]
      message: "chore(workflow): phase 11 — implementation tasks created"
    priority: 14

  - name: "Execute Implementation"
    type: barrier
    depends_on: ["Create Implementation Tasks"]
    optional: true
    condition: ".bot/workspace/product/briefing/04_IMPLEMENTATION_RESEARCH.md"
    priority: 15

  - name: "Remediate Builds"
    type: prompt
    workflow: "10-remediate-builds.md"
    depends_on: ["Execute Implementation"]
    condition: ".bot/workspace/product/briefing/04_IMPLEMENTATION_RESEARCH.md"
    commit:
      paths: ["workspace/product/"]
      message: "chore(workflow): phase 13 — build remediation"
    priority: 16

  - name: "Draft Handoff & PRs"
    type: prompt
    workflow: "11-draft-system-docs.md"
    depends_on: ["Remediate Builds"]
    condition: ".bot/workspace/product/briefing/04_IMPLEMENTATION_RESEARCH.md"
    outputs: ["briefing/08_HANDOFF_STATUS.md"]
    commit:
      paths: ["workspace/product/"]
      message: "chore(workflow): phase 14 — handoff & draft PRs"
    priority: 17
