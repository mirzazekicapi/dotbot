name: task_create
description: Create a new task in the todo folder with structured metadata
inputSchema:
  type: object
  additionalProperties: true
  properties:
    name:
      type: string
      description: Brief, descriptive name for the task
    description:
      type: string
      description: Detailed description of what the task does and why it's needed
    category:
      type: string
      description: Task category (validated at runtime via settings.default.json)
    priority:
      type: integer
      description: Priority from 1 (highest) to 100 (lowest), default is 50
      minimum: 1
      maximum: 100
    effort:
      type: string
      description: Effort estimate (XS=1 day, S=2-3 days, M=1 week, L=2 weeks, XL=3+ weeks)
      enum: [XS, S, M, L, XL]
    dependencies:
      type: array
      description: List of task IDs that must be completed before this one
      items:
        type: string
    acceptance_criteria:
      type: array
      description: List of criteria that must be met for the task to be considered complete
      items:
        type: string
    steps:
      type: array
      description: Implementation steps or test steps for the task
      items:
        type: string
    applicable_standards:
      type: array
      description: List of standard file paths to read before implementing (e.g., .bot/standards/backend/api.md)
      items:
        type: string
    applicable_agents:
      type: array
      description: List of agent persona file paths to read before implementing (e.g., .bot/agents/backend-developer.md)
      items:
        type: string
    applicable_skills:
      type: array
      description: List of skill file paths to apply during implementation (e.g., .bot/recipes/skills/write-unit-tests/SKILL.md)
      items:
        type: string
    applicable_decisions:
      type: array
      description: List of Decision IDs that constrain this task (e.g., ["dec-a1b2c3d4", "dec-e5f6a7b8"])
      items:
        type: string
    needs_interview:
      type: boolean
      description: If true, the analysis phase should interview the user to clarify requirements before finalizing the task
      default: false
    human_hours:
      type: number
      description: Estimated hours for a skilled developer without AI assistance
    ai_hours:
      type: number
      description: Estimated hours with AI-assisted development
    working_dir:
      type: string
      description: Working directory for task execution (relative to project root)
    type:
      type: string
      description: "Task type: prompt (default, Claude CLI), prompt_template (Claude with workflow-specific prompt), script (run .ps1), mcp (call MCP tool), task_gen (script that creates more tasks)"
      enum: [prompt, prompt_template, script, mcp, task_gen]
      default: prompt
    prompt:
      type: string
      description: "Path to prompt template file (relative to workflow dir). Used with prompt_template type. E.g. recipes/prompts/03-score-tickets.md"
    script_path:
      type: string
      description: "Path to .ps1 script (relative to .bot/). Required for script and task_gen types."
    mcp_tool:
      type: string
      description: "MCP tool name to call. Required for mcp type."
    mcp_args:
      type: object
      description: "Arguments to pass to the MCP tool. For mcp type."
    skip_analysis:
      type: boolean
      description: "If true, auto-promote to analysed without LLM analysis. Default true for non-prompt types."
    skip_worktree:
      type: boolean
      description: "If true, skip git worktree creation. Default true for non-prompt types."
    model:
      type: string
      description: "Model alias override for this task (e.g. Sonnet, Opus, Haiku). Overrides the process-level model when this task executes."
  required: [name, description]
