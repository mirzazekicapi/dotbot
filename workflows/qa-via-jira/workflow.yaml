name: qa-via-jira
version: "1.0"
description: >-
  QA test planning workflow. Fetches Jira requirements, detects affected systems,
  generates test plans (overall + per-system), UAT plans, and test cases with
  full traceability to acceptance criteria.
icon: clipboard-check
min_dotbot_version: "3.5"

mcp_servers:
  atlassian:
    type: http
    url: https://mcp.atlassian.com/v1/mcp

remove_mcp_servers:
  - context7
  - playwright
  - serena

requires:
  mcp_servers:
    - name: atlassian
      message: "Atlassian MCP server is required for Jira/Confluence access"
      hint: "Run 'claude mcp add atlassian' to register it"
    - name: dotbot
      message: "Dotbot MCP server is required for task management"
      hint: "Run 'dotbot init --force' to re-register it"
  cli_tools:
    - name: git
      message: "git CLI is required"
      hint: "Install from https://git-scm.com/"

form:
  modes:
    - id: generate_qa
      label: "Generate QA Plan"
      description: "Generate QA test plans and test cases from Jira requirements."
      button: "GENERATE QA PLAN"
      show_prompt: false
      show_interview: false
      show_files: false
      # Declarative form inputs — rendered generically by core/ui/static/modules/workflow-launch.js.
      # Values land in .bot/.control/launchers/qa-via-jira-form-input.json and are read by the
      # 01-fetch-jira-context.md prompt template via {form_input.<id>}.
      fields:
        - id: jira_keys
          type: text
          label: "Jira Tickets"
          required: true
          placeholder: "PROJ-123, PROJ-456 or paste full URLs"
          hint: "One or more Jira issue keys, comma-separated"
        - id: confluence_urls
          type: textarea
          label: "Confluence Pages"
          rows: 2
          placeholder: "https://site.atlassian.net/wiki/spaces/..."
          hint: "Optional Confluence page URLs, one per line"
        - id: instructions
          type: textarea
          label: "Additional Instructions"
          rows: 3
          placeholder: "Focus on API validation, include negative test cases..."
          hint: "Optional free-text guidance for the QA plan generation"
        - id: approval_mode
          type: toggle
          label: "Require approval between phases"
          default: false
          hint: "Stop after each artifact for review before continuing (wired in a later step)"

domain:
  task_categories: ["qa-test-plan", "qa-test-cases", "qa-uat", "qa-automation"]

tasks:
  - name: "Fetch Jira Context"
    type: prompt_template
    prompt: "recipes/prompts/01-fetch-jira-context.md"
    # Outputs are paths relative to the run's outputs_dir
    # (.bot/workspace/qa-via-jira/runs/{run_id}/), surfaced by
    # /api/workflows/{name}/runs/{id}/results.
    outputs: ["jira-context.json", "jira-context-full.md"]
    commit:
      paths: ["workspace/qa-via-jira/runs/"]
      message: "chore(qa): fetch jira context"
    priority: 1
    on_failure: halt

  - name: "Detect Systems"
    type: prompt_template
    prompt: "recipes/prompts/02-detect-systems.md"
    depends_on: ["Fetch Jira Context"]
    outputs: ["systems.json"]
    commit:
      paths: ["workspace/qa-via-jira/runs/"]
      message: "chore(qa): detect affected systems"
    priority: 2
    on_failure: halt

  - name: "Generate Test Plan"
    type: prompt_template
    prompt: "recipes/prompts/03-generate-test-plan.md"
    depends_on: ["Detect Systems"]
    outputs: ["test-plan.md"]
    commit:
      paths: ["workspace/qa-via-jira/runs/"]
      message: "chore(qa): generate overall test plan"
    priority: 3

  - name: "Generate UAT Plan"
    type: prompt_template
    prompt: "recipes/prompts/04-generate-uat-plan.md"
    depends_on: ["Generate Test Plan"]
    outputs: ["uat-plan.md"]
    commit:
      paths: ["workspace/qa-via-jira/runs/"]
      message: "chore(qa): generate UAT plan"
    priority: 4

  - name: "Generate Per-System Plans"
    type: prompt_template
    prompt: "recipes/prompts/05-generate-system-plans.md"
    depends_on: ["Generate Test Plan"]
    commit:
      paths: ["workspace/qa-via-jira/runs/"]
      message: "chore(qa): generate per-system test plans"
    priority: 5

  - name: "Generate Test Cases"
    type: prompt_template
    prompt: "recipes/prompts/06-generate-test-cases.md"
    depends_on: ["Generate Per-System Plans", "Generate UAT Plan"]
    commit:
      paths: ["workspace/qa-via-jira/runs/"]
      message: "chore(qa): generate test cases"
    priority: 6

  - name: "Validate Coverage"
    type: prompt_template
    prompt: "recipes/prompts/07-validate-coverage.md"
    depends_on: ["Generate Test Cases"]
    outputs: ["pipeline-complete.json"]
    commit:
      paths: ["workspace/qa-via-jira/runs/"]
      message: "chore(qa): validate traceability and coverage"
    priority: 7
